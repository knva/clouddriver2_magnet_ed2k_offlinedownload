name: Build and Release EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to publish, for example v0.1.0"
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: uv run pytest -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Compile Python files
        run: uv run python -m compileall gui_app.py qml tests

      - name: Smoke test QML
        shell: powershell
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -c "from pathlib import Path; from PySide6.QtCore import QSettings; from PySide6.QtQml import QQmlApplicationEngine; from PySide6.QtWidgets import QApplication; from gui_app import ClipboardController; app = QApplication([]); engine = QQmlApplicationEngine(); controller = ClipboardController(settings=QSettings(QSettings.Format.IniFormat, QSettings.Scope.UserScope, 'cd2api-ci', 'qml-smoke')); engine.rootContext().setContextProperty('controller', controller); engine.load(str(Path('qml/Main.qml').resolve())); assert engine.rootObjects(); print('qml smoke ok')"

  build-windows:
    name: Build Windows EXE
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install build dependencies
        run: uv sync --locked --group build

      - name: Install UPX
        shell: powershell
        run: |
          choco install upx -y --no-progress
          $upx = (Get-Command upx).Source
          "UPX_DIR=$(Split-Path $upx)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          upx --version

      - name: Build executable
        shell: powershell
        run: uv run pyinstaller --clean --noconfirm --upx-dir "$env:UPX_DIR" CD2ClipboardHelper.spec

      - name: Create release assets
        shell: powershell
        run: |
          $exe = "dist\CD2ClipboardHelper.exe"
          if (-not (Test-Path $exe)) {
            throw "Executable not found: $exe"
          }
          $zip = "dist\CD2ClipboardHelper-windows-x64.zip"
          $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
          if (Test-Path $sevenZip) {
            & $sevenZip a -tzip -mx=9 $zip $exe
          } else {
            Compress-Archive -Path $exe -DestinationPath $zip -Force
          }
          Get-FileHash $exe -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  CD2ClipboardHelper.exe"
          } | Set-Content -Encoding ASCII "dist\SHA256SUMS.txt"
          Get-ChildItem dist | Select-Object Name,Length | Format-Table -AutoSize

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CD2ClipboardHelper-windows-x64
          path: |
            dist/CD2ClipboardHelper.exe
            dist/CD2ClipboardHelper-windows-x64.zip
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/CD2ClipboardHelper.exe
            dist/CD2ClipboardHelper-windows-x64.zip
            dist/SHA256SUMS.txt
